<!doctype html>
<html>
  <head>
    <title>Training Status</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --black: #0a0a0a;
        --white: #f5f5f0;
        --mid: #888;
        --light: #d4d4d0;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: var(--white);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        position: relative;
        overflow: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(10, 10, 10, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(10, 10, 10, 0.04) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
        z-index: 0;
      }

      body::after {
        content: "";
        position: fixed;
        top: 30px;
        right: 30px;
        width: 60px;
        height: 60px;
        border-top: 2px solid var(--black);
        border-right: 2px solid var(--black);
        pointer-events: none;
        z-index: 0;
      }

      .corner-bl {
        position: fixed;
        bottom: 30px;
        left: 30px;
        width: 60px;
        height: 60px;
        border-bottom: 2px solid var(--black);
        border-left: 2px solid var(--black);
        pointer-events: none;
        z-index: 0;
      }

      .container {
        position: relative;
        z-index: 1;
        background: var(--white);
        border: 2px solid var(--black);
        box-shadow: 8px 8px 0 var(--black);
        max-width: 480px;
        width: 100%;
        animation: slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Header */
      .card-header {
        background: var(--black);
        padding: 24px 36px 20px;
        position: relative;
        overflow: hidden;
      }

      .card-header::before {
        content: "TRAIN";
        position: absolute;
        right: -8px;
        top: 50%;
        transform: translateY(-50%);
        font-family: "Bebas Neue", sans-serif;
        font-size: 5em;
        color: rgba(255, 255, 255, 0.04);
        letter-spacing: 0.05em;
        pointer-events: none;
        white-space: nowrap;
      }

      .header-tag {
        font-family: "DM Mono", monospace;
        font-size: 0.68em;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--mid);
        margin-bottom: 6px;
      }

      .card-header h2 {
        font-family: "Bebas Neue", sans-serif;
        font-size: 2.4em;
        letter-spacing: 0.04em;
        color: var(--white);
        line-height: 1;
      }

      /* Status bar */
      .status-bar {
        background: var(--black);
        border-top: 1px solid #222;
        padding: 8px 36px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #f5a623;
        animation: pulse 1.2s ease-in-out infinite;
        flex-shrink: 0;
        transition: background 0.4s ease;
      }
      .status-dot.success {
        background: #44cc66;
        animation: none;
      }
      .status-dot.error {
        background: #ff4444;
        animation: none;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.25;
        }
      }

      .status-bar-text {
        font-family: "DM Mono", monospace;
        font-size: 0.68em;
        color: var(--mid);
        letter-spacing: 0.12em;
        text-transform: uppercase;
        transition: color 0.4s ease;
      }

      /* Body */
      .card-body {
        padding: 40px 36px 36px;
        text-align: center;
      }

      /* ── Loading state ── */
      .loader-wrap {
        margin-bottom: 28px;
        display: flex;
        justify-content: center;
      }

      .loader {
        position: relative;
        width: 64px;
        height: 64px;
      }

      .loader-ring {
        position: absolute;
        inset: 0;
        border: 3px solid var(--light);
        border-top-color: var(--black);
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }

      .loader-ring-inner {
        position: absolute;
        inset: 10px;
        border: 2px solid transparent;
        border-bottom-color: var(--mid);
        border-radius: 50%;
        animation: spin 1.4s linear infinite reverse;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Progress bar */
      .progress-wrap {
        margin-bottom: 28px;
      }

      .progress-label {
        display: flex;
        justify-content: space-between;
        font-family: "DM Mono", monospace;
        font-size: 0.68em;
        color: var(--mid);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-bottom: 8px;
      }

      .progress-track {
        height: 3px;
        background: var(--light);
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        background: var(--black);
        width: 0%;
        animation: progressAnim 8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }

      @keyframes progressAnim {
        0% {
          width: 0%;
        }
        30% {
          width: 35%;
        }
        60% {
          width: 62%;
        }
        85% {
          width: 88%;
        }
        100% {
          width: 95%;
        }
      }

      .state-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: 1.9em;
        letter-spacing: 0.04em;
        color: var(--black);
        margin-bottom: 10px;
      }

      .state-message {
        font-family: "DM Mono", monospace;
        font-size: 0.75em;
        letter-spacing: 0.1em;
        color: var(--mid);
        text-transform: uppercase;
      }

      /* ── Success / Error icons ── */
      .icon-box {
        width: 64px;
        height: 64px;
        border: 2px solid var(--black);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 28px;
        font-size: 1.6em;
        animation: popIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      .icon-box.error-box {
        border-color: #ff4444;
        color: #ff4444;
      }
      .icon-box.success-box {
        border-color: #44cc66;
        color: #44cc66;
      }

      @keyframes popIn {
        from {
          opacity: 0;
          transform: scale(0.7);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      /* Buttons */
      .button-group {
        display: flex;
        gap: 10px;
        margin-top: 28px;
      }

      .btn {
        flex: 1;
        padding: 12px 20px;
        font-family: "DM Mono", monospace;
        font-size: 0.75em;
        font-weight: 500;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        border: 2px solid var(--black);
        cursor: pointer;
        position: relative;
        overflow: hidden;
        transition: color 0.2s ease;
      }

      .primary-btn {
        background: var(--black);
        color: var(--white);
      }

      .primary-btn::after {
        content: "";
        position: absolute;
        inset: 0;
        background: var(--white);
        transform: translateX(-100%);
        transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        z-index: 0;
      }

      .primary-btn:hover::after {
        transform: translateX(0);
      }
      .primary-btn:hover {
        color: var(--black);
      }
      .primary-btn span {
        position: relative;
        z-index: 1;
      }

      /* Redirect countdown */
      .redirect-text {
        font-family: "DM Mono", monospace;
        font-size: 0.67em;
        color: var(--light);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-top: 14px;
      }

      /* Footer */
      .card-footer {
        border-top: 1px solid var(--light);
        padding: 13px 36px;
        display: flex;
        justify-content: space-between;
      }

      .footer-text {
        font-family: "DM Mono", monospace;
        font-size: 0.65em;
        color: var(--light);
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      @media (max-width: 520px) {
        .container {
          box-shadow: 4px 4px 0 var(--black);
        }
        .card-header,
        .card-body {
          padding-left: 24px;
          padding-right: 24px;
        }
        .status-bar,
        .card-footer {
          padding-left: 24px;
          padding-right: 24px;
        }
      }
    </style>
  </head>
  <body>
    <div class="corner-bl"></div>

    <div class="container">
      <div class="card-header">
        <div class="header-tag" id="headerTag">Processing</div>
        <h2 id="headerTitle">Model Training</h2>
      </div>

      <div class="status-bar">
        <div class="status-dot" id="statusDot"></div>
        <div class="status-bar-text" id="statusBarText">
          Initializing pipeline...
        </div>
      </div>

      <div class="card-body" id="cardBody">
        <!-- Loading state (default) -->
        <div class="loader-wrap">
          <div class="loader">
            <div class="loader-ring"></div>
            <div class="loader-ring-inner"></div>
          </div>
        </div>

        <div class="progress-wrap">
          <div class="progress-label">
            <span>Progress</span>
            <span id="progressPct">—</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>

        <div class="state-title" id="stateTitle">Training Model</div>
        <div class="state-message" id="stateMessage">
          Please wait — this may take a few minutes
        </div>
      </div>

      <div class="card-footer">
        <div class="footer-text">ML-based classifier</div>
        <div class="footer-text" id="footerRight">Running...</div>
      </div>
    </div>

    <script>
      // Animate progress percentage display
      const progressFill = document.getElementById("progressFill");
      const progressPct = document.getElementById("progressPct");
      let animFrame;

      function trackProgress() {
        const style = window.getComputedStyle(progressFill);
        const width = parseFloat(style.width);
        const parent = parseFloat(
          window.getComputedStyle(progressFill.parentElement).width,
        );
        const pct = Math.round((width / parent) * 100);
        progressPct.textContent = pct + "%";
        if (pct < 95) animFrame = requestAnimationFrame(trackProgress);
      }
      animFrame = requestAnimationFrame(trackProgress);

      function setSuccess() {
        cancelAnimationFrame(animFrame);

        // Status bar
        document.getElementById("statusDot").className = "status-dot success";
        document.getElementById("statusBarText").textContent =
          "Training complete";

        // Header
        document.getElementById("headerTag").textContent = "Complete";
        document.getElementById("headerTitle").textContent = "Training Done";

        // Body
        document.getElementById("cardBody").innerHTML = `
          <div class="icon-box success-box">✓</div>
          <div class="state-title">Training Complete</div>
          <div class="state-message">Model trained successfully</div>
          <div class="button-group">
            <button class="btn primary-btn" onclick="goHome()">
              <span>← Back to Home</span>
            </button>
          </div>
          <div class="redirect-text" id="countdown">Redirecting in 5s...</div>
        `;

        document.getElementById("footerRight").textContent = "Success";

        // Countdown
        let secs = 5;
        const cd = setInterval(() => {
          secs--;
          const el = document.getElementById("countdown");
          if (el) el.textContent = `Redirecting in ${secs}s...`;
          if (secs <= 0) {
            clearInterval(cd);
            window.location.href = "/";
          }
        }, 1000);
      }

      function setError(msg) {
        cancelAnimationFrame(animFrame);

        document.getElementById("statusDot").className = "status-dot error";
        document.getElementById("statusBarText").textContent =
          "Training failed";
        document.getElementById("headerTag").textContent = "Error";
        document.getElementById("headerTitle").textContent = "Training Failed";

        document.getElementById("cardBody").innerHTML = `
          <div class="icon-box error-box">✕</div>
          <div class="state-title">Training Failed</div>
          <div class="state-message" style="color:#ff4444">${msg}</div>
          <div class="button-group">
            <button class="btn primary-btn" onclick="goHome()">
              <span>← Back to Home</span>
            </button>
          </div>
        `;

        document.getElementById("footerRight").textContent = "Failed";
      }

      function goHome() {
        window.location.href = "/";
      }

      async function startTraining() {
        try {
          const res = await fetch("/train-run");
          await res.text();
          setSuccess();
        } catch (err) {
          setError(err.message);
        }
      }

      startTraining();
    </script>
  </body>
</html>
